<svg width="200" height="80" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="80" fill="white"/>

  <!-- Logo Icon -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="30" cy="30" r="28" fill="#F0F7FF" stroke="#0052CC" stroke-width="1.5"/>

    <!-- Connected nodes representing people/network -->
    <!-- Top left node (cyan) -->
    <circle cx="16" cy="16" r="5.5" fill="#00A4EF"/>

    <!-- Top right node (blue) -->
    <circle cx="44" cy="16" r="5.5" fill="#0052CC"/>

    <!-- Bottom center node (dark blue) -->
    <circle cx="30" cy="44" r="5.5" fill="#0078D4"/>

    <!-- Connection lines -->
    <!-- Top horizontal line -->
    <line x1="20" y1="19" x2="40" y2="19" stroke="#00A4EF" stroke-width="2" stroke-linecap="round"/>

    <!-- Left diagonal line -->
    <line x1="16" y1="22" x2="30" y2="40" stroke="#0078D4" stroke-width="2" stroke-linecap="round"/>

    <!-- Right diagonal line -->
    <line x1="44" y1="22" x2="30" y2="40" stroke="#0078D4" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Company Name -->
  <g>
    <!-- "Ukonnect" text with gradient -->
    <defs>
      <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#00A4EF;stop-opacity:1" />
      </linearGradient>
    </defs>

    <text x="70" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="url(#nameGradient)" letter-spacing="-0.5">
      Ukonnect
    </text>

    <!-- Tagline -->
    <text x="70" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#666666" letter-spacing="1" text-transform="uppercase">
      STAFFING SOLUTIONS
    </text>
  </g>
</svg>