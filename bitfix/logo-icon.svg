<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="#F0F7FF" stroke="#0052CC" stroke-width="3"/>

  <!-- Connected network nodes -->
  <!-- Top left node (Cyan) -->
  <circle cx="60" cy="60" r="18" fill="#00A4EF"/>

  <!-- Top right node (Blue) -->
  <circle cx="140" cy="60" r="18" fill="#0052CC"/>

  <!-- Bottom center node (Dark Blue) -->
  <circle cx="100" cy="140" r="18" fill="#0078D4"/>

  <!-- Center connecting node (for visual balance) -->
  <circle cx="100" cy="100" r="14" fill="#00A4EF"/>

  <!-- Connection lines -->
  <!-- Top horizontal line -->
  <line x1="75" y1="60" x2="125" y2="60" stroke="#00A4EF" stroke-width="5" stroke-linecap="round"/>

  <!-- Left diagonal line -->
  <line x1="70" y1="75" x2="95" y2="110" stroke="#0078D4" stroke-width="5" stroke-linecap="round"/>

  <!-- Right diagonal line -->
  <line x1="130" y1="75" x2="105" y2="110" stroke="#0078D4" stroke-width="5" stroke-linecap="round"/>

  <!-- Bottom lines -->
  <line x1="95" y1="115" x2="75" y2="125" stroke="#0052CC" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="115" x2="125" y2="125" stroke="#0052CC" stroke-width="4" stroke-linecap="round"/>
</svg>